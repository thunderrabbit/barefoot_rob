baseURL = "https://www.robnugen.com/"
languageCode = "en-us"
theme = [ "purehugo" ]
rssLimit = 50
defaultContentLanguageInSubdir = true

# Hugo 0.162.0 (CVE-2026-50133) denies raw text/html content files by default.
# Rob hand-authors all content (no untrusted import). Setting allowContent
# REPLACES the default, so least-privilege = allow ONLY the page formats we use:
# markdown (785 files) + html (the two legacy pages under content/yruu/sf/).
# This is stricter than Hugo's default, which allowed every format except html.
[security]
  allowContent = ['^text/markdown$', '^text/html$']

[markup.goldmark.renderer]
unsafe= true

[markup.highlight]
  noClasses = false
  style = "github"

[params]
    mainSections = ["events"]
  	author = "Rob Nugen"
    hideSidebarIconText = true
	twitterName_removed_2023_mar_23 = "thunderrabbit"
	githubName_removed_2023_mar_23 = "thunderrabbit"
  mastadonName_removed_2023_mar_23 = "robnugen"
	facebook = "thunderrabbit"
  youtube = "thunderrabbit"
	linkedin = "robnugen"
	description = "Connection Coach For Men"
	hideShareOptions = true
[permalinks]
    blog = "/blog/:year/:month/:day/:title/"
    journal = "/journal/:year/:month/:day/:title/"

[languages]
  [languages.en]
    title = "Rob Nugen"
    weight = 1
    LanguageName = "English"
    description = "Connection Coach For Men"

  [languages.ja]
    title = "裸足のロブ"
    weight = 2
    LanguageName = "日本語"
    description = "I walk barefoot"
